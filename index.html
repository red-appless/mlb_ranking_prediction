<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB順位予想 2026</title>
    <style>
        :root {
            --mlb-blue: #002D72;
            --mlb-red: #E31937;
            --bg-color: #f4f7f9;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 25px; }
        h1, h2, h3 { color: var(--mlb-blue); text-align: center; }
        
        /* Navigation */
        .back-btn { display: inline-block; margin-bottom: 15px; color: var(--mlb-blue); font-weight: bold; text-decoration: none; cursor: pointer; }

        /* Buttons & Controls */
        .header-box { text-align: center; margin-bottom: 10px; }
        button { background-color: var(--mlb-red); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #b3142b; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.95em; }
        th, td { padding: 10px 8px; border: 1px solid #eee; text-align: center; }
        th { background-color: var(--mlb-blue); color: white; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        
        .clickable-name { color: var(--mlb-blue); text-decoration: underline; cursor: pointer; font-weight: bold; }
        .score-total { font-size: 1.3em; font-weight: bold; color: var(--mlb-red); }

        /* Logo & Team Cell */
        .team-cell { display: flex; align-items: center; justify-content: flex-start; gap: 10px; text-align: left; }
        .team-logo { width: 24px; height: 24px; object-fit: contain; }
        .team-logo-large { width: 40px; height: 40px; }

        /* Grid Layout */
        .division-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(550px, 1fr)); gap: 20px; }

        /* Individual Page Elements */
        .player-header { background: var(--mlb-blue); color: white; padding: 30px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .prediction-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; background: white; }
        .rank-badge { width: 30px; font-weight: bold; color: #666; }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="topPage">
            <div class="card">
                <h1>⚾ MLB 順位予想バトル 2026</h1>
                <div class="header-box">
                    <button id="updateButton">最新データに更新</button>
                    <p>最終更新: <span id="lastUpdated">取得中...</span></p>
                </div>
            </div>

            <div class="card">
                <h2>🏆 総合ランキング</h2>
                <table id="scoreTable">
                    <thead><tr><th>位</th><th>プレイヤー</th><th>合計反転数</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="division-grid" id="divisionsContainer"></div>
        </div>

        <div id="playerPage" class="hidden">
            <span class="back-btn" onclick="location.hash=''">← 総合ランキングに戻る</span>
            <div class="player-header">
                <h1 id="detailPlayerName"></h1>
                <p>個人予想順位リスト</p>
            </div>
            <div class="division-grid" id="playerPredictionsGrid"></div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyO5_oG_IAp8whEPVHdSLKiP945F-fCb9uPymUo6hm3ZNu93-rqZKpQj-bfv7diGcXZ/exec";
        let globalData = null;

        // 公式ロゴURL
        const getLogo = (id) => `https://www.mlbstatic.com/team-logos/${id}.svg`;

        async function loadData() {
            try {
                const res = await fetch('./data.json?' + Date.now());
                globalData = await res.json();
                renderTopPage();
                handleRouting();
            } catch (e) { document.getElementById('lastUpdated').innerText = "データ未生成"; }
        }

        function renderTopPage() {
            document.getElementById('lastUpdated').innerText = globalData.last_updated;

            // 総合スコア
            const scoreBody = document.querySelector('#scoreTable tbody');
            scoreBody.innerHTML = Object.entries(globalData.scores)
                .sort((a, b) => a[1] - b[1])
                .map(([name, score], i) => `
                    <tr>
                        <td>${i+1}</td>
                        <td><span class="clickable-name" onclick="location.hash='${encodeURIComponent(name)}'">${name}</span></td>
                        <td class="score-total">${score}</td>
                    </tr>`).join('');

            // 各地区の比較表（元の形式 + ロゴ）
            const divContainer = document.getElementById('divisionsContainer');
            divContainer.innerHTML = globalData.divisions.map(div => `
                <div class="card">
                    <h3>${div.name}</h3>
                    <table>
                        <thead>
                            <tr>
                                <th style="width:50px">実順位</th>
                                <th>チーム</th>
                                <th style="width:60px">井口</th>
                                <th style="width:60px">細川</th>
                                <th style="width:60px">田中</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${div.teams.map(t => `
                                <tr>
                                    <td>${t.actual_rank}</td>
                                    <td>
                                        <div class="team-cell">
                                            <img class="team-logo" src="${getLogo(t.id)}" alt="">
                                            <span>${t.name}</span>
                                        </div>
                                    </td>
                                    <td style="background:#fffde7">${t.predictions["井口健介"]}</td>
                                    <td style="background:#f1f8e9">${t.predictions["細川峻平"]}</td>
                                    <td style="background:#e3f2fd">${t.predictions["田中雄太郎"]}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `).join('');
        }

        function renderPlayerDetail(playerName) {
            document.getElementById('topPage').classList.add('hidden');
            document.getElementById('playerPage').classList.remove('hidden');
            document.getElementById('detailPlayerName').innerText = playerName;

            const grid = document.getElementById('playerPredictionsGrid');
            grid.innerHTML = globalData.divisions.map(div => {
                const sortedTeams = [...div.teams].sort((a, b) => a.predictions[playerName] - b.predictions[playerName]);
                return `
                    <div class="card">
                        <h3>${div.name}</h3>
                        ${sortedTeams.map(t => `
                            <div class="prediction-row">
                                <div class="rank-badge">${t.predictions[playerName]}</div>
                                <img class="team-logo team-logo-large" src="${getLogo(t.id)}" alt="">
                                <div style="margin-left:15px">
                                    <div style="font-weight:bold">${t.name}</div>
                                    <div style="font-size:0.8em; color:#888">現在 ${t.actual_rank}位</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }).join('');
        }

        function handleRouting() {
            const hash = decodeURIComponent(location.hash.replace('#', ''));
            if (hash && globalData && globalData.scores[hash] !== undefined) {
                renderPlayerDetail(hash);
                window.scrollTo(0, 0);
            } else {
                document.getElementById('topPage').classList.remove('hidden');
                document.getElementById('playerPage').classList.add('hidden');
            }
        }

        window.onhashchange = handleRouting;

        document.getElementById('updateButton').onclick = async () => {
            if(!confirm("GitHub Actionsを起動しますか？")) return;
            const btn = document.getElementById('updateButton');
            btn.disabled = true; btn.innerText = "GAS送信中...";
            try {
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors' });
                alert("送信完了！2分後にリロードしてください。");
            } catch (e) { alert("エラー"); btn.disabled = false; }
        };

        loadData();
    </script>
</body>
</html>
